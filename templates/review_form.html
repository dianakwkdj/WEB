{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
{% endblock %}

{% block content %}
<div class="soft-card wide-form">
    <a class="muted-link" href="{{ url_for('show_book', book_id=book.id) }}">← К книге</a>
    <h1 class="mt-2">Новая рецензия</h1>
    <p class="text-muted">Книга: {{ book.title }}</p>

    <form method="post" class="markdown-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label" for="rating">Оценка</label>
            <select class="form-select" id="rating" name="rating" required>
                <option value="5" selected>отлично</option>
                <option value="4">хорошо</option>
                <option value="3">удовлетворительно</option>
                <option value="2">неудовлетворительно</option>
                <option value="1">плохо</option>
                <option value="0">ужасно</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" for="text">Текст рецензии</label>
            <textarea class="form-control markdown-box" id="text" name="text" rows="8">{{ request.form.get('text', '') }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-rose" type="submit">Сохранить</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('show_book', book_id=book.id) }}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    const textarea = document.querySelector('.markdown-box');
    if (textarea) {
        const editor = new EasyMDE({
            element: textarea,
            spellChecker: false,
            placeholder: 'Напишите рецензию с Markdown-разметкой...'
        });
        textarea.closest('form').addEventListener('submit', function () {
            editor.codemirror.save();
        });
    }
</script>
{% endblock %}
