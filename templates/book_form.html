{% extends 'base.html' %}
{% from 'macros.html' import book_form %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
{% endblock %}

{% block content %}
<div class="soft-card wide-form">
    <div class="mb-4">
        <a class="muted-link" href="{{ url_for('index') }}">← На главную</a>
        <h1 class="mt-2">{{ title }}</h1>
    </div>
    <form method="post" action="{{ action }}" class="markdown-form" {% if not is_edit %}enctype="multipart/form-data"{% endif %}>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        {{ book_form(book, genres, selected, is_edit, form) }}
        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-rose" type="submit">Сохранить</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    const textarea = document.querySelector('.markdown-box');
    if (textarea) {
        const editor = new EasyMDE({
            element: textarea,
            spellChecker: false,
            placeholder: 'Введите описание книги с Markdown-разметкой...'
        });
        textarea.closest('form').addEventListener('submit', function () {
            editor.codemirror.save();
        });
    }
</script>
{% endblock %}
