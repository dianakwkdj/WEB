{% macro book_form(book, genres, selected, is_edit, form) %}
    <div class="row g-3">
        <div class="col-md-8">
            <label class="form-label" for="title">Название</label>
            <input class="form-control" id="title" name="title" required
                   value="{{ form.get('title') if form else (book.title if book else '') }}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="year">Год</label>
            <input class="form-control" id="year" name="year" type="number" min="1" required
                   value="{{ form.get('year') if form else (book.year if book else '') }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="publisher">Издательство</label>
            <input class="form-control" id="publisher" name="publisher" required
                   value="{{ form.get('publisher') if form else (book.publisher if book else '') }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="author">Автор</label>
            <input class="form-control" id="author" name="author" required
                   value="{{ form.get('author') if form else (book.author if book else '') }}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="pages">Объём, страниц</label>
            <input class="form-control" id="pages" name="pages" type="number" min="1" required
                   value="{{ form.get('pages') if form else (book.pages if book else '') }}">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="genres">Жанры</label>
            <select class="form-select" id="genres" name="genres" multiple required size="5">
                {% for genre in genres %}
                    <option value="{{ genre.id }}" {% if genre.id in selected %}selected{% endif %}>{{ genre.name }}</option>
                {% endfor %}
            </select>
            <div class="form-text">Можно выбрать несколько жанров.</div>
        </div>
        {% if not is_edit %}
            <div class="col-12">
                <label class="form-label" for="cover">Обложка</label>
                <input class="form-control" id="cover" name="cover" type="file" accept="image/*" required>
            </div>
        {% endif %}
        <div class="col-12">
            <label class="form-label" for="description">Краткое описание</label>
            <textarea class="form-control markdown-box" id="description" name="description" rows="9">{{ form.get('description') if form else (book.description if book else '') }}</textarea>
            <div class="form-text">Поддерживается Markdown-разметка.</div>
        </div>
    </div>
{% endmacro %}
